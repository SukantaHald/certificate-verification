<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
    // =============================================
    // ===== EMAILJS CONFIGURATION =====
    // =============================================

    const EMAILJS_PUBLIC_KEY = '5Kudvo58byC5rhgTQ';
    const EMAILJS_SERVICE_ID = 'service_4j4hu3p';       // Replace with your Service ID
    const EMAILJS_TEMPLATE_ID = 'template_go0iyeo';     // Replace with your Template ID
    const ADMIN_EMAIL = 'vivakehaldersocialmedia@gmail.com';

    // Initialize EmailJS
    emailjs.init(EMAILJS_PUBLIC_KEY);

    // =============================================
    // ===== INTERNSHIP SELECTION =====
    // =============================================

    let selectedInternship = null;

    document.querySelectorAll('.internship-card').forEach(card => {
        card.addEventListener('click', function() {
            document.querySelectorAll('.internship-card').forEach(c => c.classList.remove('selected'));
            this.classList.add('selected');
            selectedInternship = this.dataset.value;
            document.getElementById('internshipError').style.display = 'none';
        });
    });

    // =============================================
    // ===== FORM SUBMISSION =====
    // =============================================

    document.getElementById('applyForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Validate internship selection
        if (!selectedInternship) {
            document.getElementById('internshipError').style.display = 'block';
            document.getElementById('internshipError').scrollIntoView({ behavior: 'smooth' });
            return;
        }

        // Validate password match
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (password !== confirmPassword) {
            alert('❌ Passwords do not match!');
            return;
        }

        // Validate WhatsApp number
        const whatsapp = document.getElementById('whatsapp').value;
        if (!/^[0-9]{10}$/.test(whatsapp)) {
            alert('❌ Please enter a valid 10-digit WhatsApp number.');
            return;
        }

        // Collect form data
        const formData = {
            internship: selectedInternship,
            first_name: document.getElementById('firstName').value,
            last_name: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value,
            gender: document.getElementById('gender').value,
            dob: document.getElementById('dob').value,
            college: document.getElementById('college').value,
            qualification: document.getElementById('qualification').value,
            year_of_study: document.getElementById('yearOfStudy').value,
            passing_year: document.getElementById('passingYear').value,
            college_state: document.getElementById('collegeState').value,
            country: document.getElementById('country').value,
            submitted_at: new Date().toLocaleString()
        };

        // Show loading state
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.classList.add('loading');
        submitBtn.disabled = true;

        // =============================================
        // ===== SEND EMAIL VIA EMAILJS =====
        // =============================================

        emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
            to_email: ADMIN_EMAIL,
            internship: formData.internship,
            first_name: formData.first_name,
            last_name: formData.last_name,
            email: formData.email,
            whatsapp: formData.whatsapp,
            gender: formData.gender,
            dob: formData.dob,
            college: formData.college,
            qualification: formData.qualification,
            year_of_study: formData.year_of_study,
            passing_year: formData.passing_year,
            college_state: formData.college_state,
            country: formData.country,
            submitted_at: formData.submitted_at
        })
        .then(function(response) {
            console.log('Email sent successfully!', response);
            showSuccess();
        })
        .catch(function(error) {
            console.error('Email sending failed:', error);
            alert('❌ Failed to send application. Please try again or contact support.');
        })
        .finally(function() {
            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
        });
    });

    // =============================================
    // ===== SUCCESS FUNCTION =====
    // =============================================

    function showSuccess() {
        document.getElementById('applyForm').style.display = 'none';
        document.getElementById('successMessage').classList.add('show');
        document.querySelector('.internship-grid').style.display = 'none';
        document.querySelector('[style*="margin-bottom: 30px;"] h3').style.display = 'none';
        document.getElementById('successMessage').scrollIntoView({ behavior: 'smooth' });
    }
</script>
