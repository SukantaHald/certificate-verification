<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InternVerify</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto 40px;
            padding: 20px;
        }
        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.08);
        }
        .auth-box .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-box .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-box .logo p {
            color: #888;
            font-size: 0.95rem;
            margin-top: 5px;
        }
        .auth-box .form-group {
            margin-bottom: 20px;
        }
        .auth-box .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 0.95rem;
        }
        .auth-box .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        .auth-box .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }
        .auth-box .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        .auth-box .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }
        .auth-box .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .auth-box .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-box .auth-link a:hover {
            text-decoration: underline;
        }
        .auth-error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .auth-error.show {
            display: block;
        }
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        .back-home a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-home a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .auth-box { padding: 25px; }
        }
    </style>
</head>
<body>
    <!-- ===== NAVIGATION ===== -->
  <nav class="navbar">
    <div class="nav-container">
        <!-- ☰ Menu Icon -->
        <div class="menu-container">
            <button class="menu-toggle" onclick="toggleMenu()">
                <span class="menu-icon">☰</span>
            </button>
            <div class="menu-dropdown" id="menuDropdown">
                <a href="apply.html" class="menu-item apply-item">📝 Apply</a>
                <a href="dashboard.html" class="menu-item dashboard-item">👤 Dashboard</a>
                <a href="login.html" class="menu-item">🔐 Login</a>
                <a href="signup.html" class="menu-item">📝 Sign Up</a>
                <a href="admin.html" class="menu-item admin-item">👑 Admin</a>
                <a href="admin-students.html" class="menu-item admin-item">👥 Students</a>
            </div>
        </div>

        <!-- Logo -->
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <span class="logo-text">InternVerify</span>
        </div>

        <!-- Nav Links -->
        <div class="nav-links">
            <a href="#home" class="nav-link active">🏠 Home</a>
            <a href="#verify" class="nav-link">✅ Verify</a>
            <a href="#about" class="nav-link">ℹ️ About</a>
        </div>

        <!-- ===== COLOR THEME SWITCHER ===== -->
        <div class="theme-switcher">
            <button class="theme-toggle" onclick="toggleThemePanel()" title="Change Theme">
                <svg class="theme-icon" viewBox="0 0 24 24" width="22" height="22">
                    <circle cx="12" cy="12" r="5" fill="currentColor" stroke="currentColor" stroke-width="2"/>
                    <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </g>
                </svg>
            </button>
            <div class="theme-panel" id="themePanel">
                <h4>Choose Theme</h4>
                <div class="theme-options">
                    <button class="theme-option active" data-theme="default" style="--primary: #667eea; --secondary: #764ba2;" onclick="applyTheme('default')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #667eea, #764ba2);"></span>
                        <span class="theme-name">Default</span>
                    </button>
                    <button class="theme-option" data-theme="ocean" style="--primary: #00b4db; --secondary: #0083b0;" onclick="applyTheme('ocean')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #00b4db, #0083b0);"></span>
                        <span class="theme-name">Ocean</span>
                    </button>
                    <button class="theme-option" data-theme="sunset" style="--primary: #f12711; --secondary: #f5af19;" onclick="applyTheme('sunset')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #f12711, #f5af19);"></span>
                        <span class="theme-name">Sunset</span>
                    </button>
                    <button class="theme-option" data-theme="forest" style="--primary: #11998e; --secondary: #38ef7d;" onclick="applyTheme('forest')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #11998e, #38ef7d);"></span>
                        <span class="theme-name">Forest</span>
                    </button>
                    <button class="theme-option" data-theme="night" style="--primary: #0f0c29; --secondary: #302b63;" onclick="applyTheme('night')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #0f0c29, #302b63);"></span>
                        <span class="theme-name">Night</span>
                    </button>
                    <button class="theme-option" data-theme="rose" style="--primary: #ff6b6b; --secondary: #ee5a24;" onclick="applyTheme('rose')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24);"></span>
                        <span class="theme-name">Rose</span>
                    </button>
                    <button class="theme-option" data-theme="purple" style="--primary: #a29bfe; --secondary: #6c5ce7;" onclick="applyTheme('purple')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #a29bfe, #6c5ce7);"></span>
                        <span class="theme-name">Purple</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

    <!-- ===== LOGIN FORM ===== -->
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <h1>🔐 InternVerify</h1>
                <p>Login to your student account</p>
            </div>

            <div id="authError" class="auth-error">❌ Invalid email or password!</div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Gmail Address</label>
                    <input type="email" id="email" placeholder="yourname@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary">🔓 Login</button>
                <div class="auth-link">
                    Don't have an account? <a href="signup.html">Sign up here</a>
                </div>
                <div class="back-home">
                    <a href="index.html">← Back to Home</a>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="script.js"></script>
    <script>
        // =============================================
        // ===== LOGIN FUNCTION - COMPLETE FIX =====
        // =============================================

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('authError');

            // Hide previous error
            errorDiv.classList.remove('show');

            // Get students from localStorage
            const students = JSON.parse(localStorage.getItem('students') || '[]');

            // Find student
            const student = students.find(s => s.email === email && s.password === password);

            if (student) {
                // Save current student
                localStorage.setItem('currentStudent', JSON.stringify(student));
                window.location.href = 'dashboard.html';
            } else {
                // Check if email exists but password is wrong
                const emailExists = students.find(s => s.email === email);
                if (emailExists) {
                    errorDiv.textContent = '❌ Invalid password. Please try again.';
                } else {
                    errorDiv.textContent = '❌ No account found with this email. Please sign up first!';
                }
                errorDiv.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // =============================================
        // ===== AUTO-LOGIN CHECK =====
        // =============================================

        const currentStudent = JSON.parse(localStorage.getItem('currentStudent') || 'null');
        if (currentStudent) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
