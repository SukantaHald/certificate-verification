<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - InternVerify</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .admin-header h1 {
            font-size: 2.5rem;
            color: #2d3436;
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            text-align: center;
        }
        .stat-card h3 {
            font-size: 2rem;
            color: #667eea;
        }
        .stat-card p {
            color: #666;
            margin-top: 5px;
        }
        .admin-form {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }
        .admin-form h2 {
            margin-bottom: 20px;
            color: #2d3436;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .btn-admin {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        .btn-success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }
        .admin-table {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .admin-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #555;
        }
        .admin-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        .admin-table tr:hover {
            background: #f8f9fa;
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2d3436;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .admin-table {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">✨</span>
                <span class="logo-text">InternVerify</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="admin.html" class="nav-link active">Admin</a>
            </div>
        </div>
    </nav>

    <!-- Admin Content -->
    <div class="admin-container" id="adminContent" style="display:none;">
        <div class="admin-header">
            <h1>📊 Admin Dashboard</h1>
            <div>
                <button onclick="exportData()" class="btn-admin btn-success" style="margin-right: 10px;">📥 Export</button>
                <button onclick="logout()" class="btn-admin btn-danger">🚪 Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="admin-stats" id="statsContainer">
            <div class="stat-card">
                <h3 id="totalCerts">0</h3>
                <p>Total Certificates</p>
            </div>
            <div class="stat-card">
                <h3 id="verifiedCerts">0</h3>
                <p>Verified</p>
            </div>
            <div class="stat-card">
                <h3 id="expiredCerts">0</h3>
                <p>Expired</p>
            </div>
        </div>

        <!-- Add/Edit Form -->
        <div class="admin-form">
            <h2 id="formTitle">➕ Add New Certificate</h2>
            <form id="certForm" onsubmit="saveCertificate(event)">
                <input type="hidden" id="editId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Certificate ID</label>
                        <input type="text" id="certIdInput" placeholder="e.g., INT-2024-004" required>
                    </div>
                    <div class="form-group">
                        <label>Student Name</label>
                        <input type="text" id="nameInput" placeholder="Full Name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Internship Role</label>
                        <input type="text" id="internshipInput" placeholder="e.g., Data Analytics Internship" required>
                    </div>
                    <div class="form-group">
                        <label>Duration</label>
                        <input type="text" id="durationInput" placeholder="e.g., 2 Months" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Completion Date</label>
                        <input type="text" id="dateInput" placeholder="e.g., October 13, 2024" required>
                    </div>
                    <div class="form-group">
                        <label>Google Drive Link</label>
                        <input type="url" id="linkInput" placeholder="https://drive.google.com/file/d/.../preview" required>
                    </div>
                </div>
                <button type="submit" class="btn-admin">💾 Save Certificate</button>
                <button type="button" onclick="resetForm()" class="btn-admin" style="background: #666; margin-left: 10px;">↺ Reset</button>
            </form>
        </div>

        <!-- Certificate List -->
        <div class="admin-table">
            <h3 style="padding: 20px 20px 0; color: #2d3436;">📜 All Certificates</h3>
            <div id="certList">
                <!-- Rendered by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 Admin Login</h2>
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="admin" value="admin" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="admin123" value="admin123" required>
                </div>
                <button type="submit" class="btn-admin" style="width: 100%;">Login</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
