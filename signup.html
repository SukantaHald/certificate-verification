<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - InternVerify</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto 40px;
            padding: 20px;
        }
        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.08);
        }
        .auth-box .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-box .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-box .logo p {
            color: #888;
            font-size: 0.95rem;
            margin-top: 5px;
        }
        .auth-box .form-group {
            margin-bottom: 20px;
        }
        .auth-box .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 0.95rem;
        }
        .auth-box .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        .auth-box .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }
        .auth-box .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        .auth-box .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }
        .auth-box .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .auth-box .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-box .auth-link a:hover {
            text-decoration: underline;
        }
        .auth-error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .auth-error.show {
            display: block;
        }
        .auth-success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .auth-success.show {
            display: block;
        }
        .password-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 4px;
        }
        @media (max-width: 480px) {
            .auth-box { padding: 25px; }
        }
    </style>
</head>
<body>
    <!-- ===== NAVIGATION ===== -->
  <nav class="navbar">
    <div class="nav-container">
        <!-- ☰ Menu Icon -->
        <div class="menu-container">
            <button class="menu-toggle" onclick="toggleMenu()">
                <span class="menu-icon">☰</span>
            </button>
            <div class="menu-dropdown" id="menuDropdown">
                <a href="apply.html" class="menu-item apply-item">📝 Apply</a>
                <a href="dashboard.html" class="menu-item dashboard-item">👤 Dashboard</a>
                <a href="login.html" class="menu-item">🔐 Login</a>
                <a href="signup.html" class="menu-item">📝 Sign Up</a>
                <a href="admin.html" class="menu-item admin-item">👑 Admin</a>
                <a href="admin-students.html" class="menu-item admin-item">👥 Students</a>
            </div>
        </div>

        <!-- Logo -->
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <span class="logo-text">InternVerify</span>
        </div>

        <!-- Nav Links -->
        <div class="nav-links">
            <a href="#home" class="nav-link active">🏠 Home</a>
            <a href="#verify" class="nav-link">✅ Verify</a>
            <a href="#about" class="nav-link">ℹ️ About</a>
        </div>

        <!-- ===== COLOR THEME SWITCHER ===== -->
        <div class="theme-switcher">
            <button class="theme-toggle" onclick="toggleThemePanel()" title="Change Theme">
                <svg class="theme-icon" viewBox="0 0 24 24" width="22" height="22">
                    <circle cx="12" cy="12" r="5" fill="currentColor" stroke="currentColor" stroke-width="2"/>
                    <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </g>
                </svg>
            </button>
            <div class="theme-panel" id="themePanel">
                <h4>Choose Theme</h4>
                <div class="theme-options">
                    <button class="theme-option active" data-theme="default" style="--primary: #667eea; --secondary: #764ba2;" onclick="applyTheme('default')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #667eea, #764ba2);"></span>
                        <span class="theme-name">Default</span>
                    </button>
                    <button class="theme-option" data-theme="ocean" style="--primary: #00b4db; --secondary: #0083b0;" onclick="applyTheme('ocean')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #00b4db, #0083b0);"></span>
                        <span class="theme-name">Ocean</span>
                    </button>
                    <button class="theme-option" data-theme="sunset" style="--primary: #f12711; --secondary: #f5af19;" onclick="applyTheme('sunset')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #f12711, #f5af19);"></span>
                        <span class="theme-name">Sunset</span>
                    </button>
                    <button class="theme-option" data-theme="forest" style="--primary: #11998e; --secondary: #38ef7d;" onclick="applyTheme('forest')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #11998e, #38ef7d);"></span>
                        <span class="theme-name">Forest</span>
                    </button>
                    <button class="theme-option" data-theme="night" style="--primary: #0f0c29; --secondary: #302b63;" onclick="applyTheme('night')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #0f0c29, #302b63);"></span>
                        <span class="theme-name">Night</span>
                    </button>
                    <button class="theme-option" data-theme="rose" style="--primary: #ff6b6b; --secondary: #ee5a24;" onclick="applyTheme('rose')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24);"></span>
                        <span class="theme-name">Rose</span>
                    </button>
                    <button class="theme-option" data-theme="purple" style="--primary: #a29bfe; --secondary: #6c5ce7;" onclick="applyTheme('purple')">
                        <span class="theme-preview" style="background: linear-gradient(135deg, #a29bfe, #6c5ce7);"></span>
                        <span class="theme-name">Purple</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

    <!-- ===== SIGNUP FORM ===== -->
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <h1>✨ InternVerify</h1>
                <p>Create your student account</p>
            </div>

            <div id="authError" class="auth-error">❌ Error message</div>
            <div id="authSuccess" class="auth-success">✅ Success message</div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Gmail Address</label>
                    <input type="email" id="email" placeholder="yourname@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required minlength="6">
                    <div class="password-hint">Minimum 6 characters</div>
                </div>
                <div class="form-group">
                    <label>Re-enter Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                </div>
                <button type="submit" class="btn-primary">🚀 Create Account</button>
                <div class="auth-link">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="script.js"></script>
    <script>
        // =============================================
        // ===== SIGNUP FUNCTION - COMPLETE FIX =====
        // =============================================

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Get error and success divs
            const errorDiv = document.getElementById('authError');
            const successDiv = document.getElementById('authSuccess');

            // Hide previous messages
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            // ===== VALIDATION =====

            // 1. Check if name is empty
            if (!fullName) {
                errorDiv.textContent = '❌ Please enter your full name.';
                errorDiv.classList.add('show');
                return;
            }

            // 2. Check if email is Gmail
            if (!email.endsWith('@gmail.com')) {
                errorDiv.textContent = '❌ Please use a valid Gmail address (e.g., name@gmail.com)';
                errorDiv.classList.add('show');
                return;
            }

            // 3. Check if email already registered
            let students = JSON.parse(localStorage.getItem('students') || '[]');
            if (students.find(s => s.email === email)) {
                errorDiv.textContent = '❌ This email is already registered. Please login.';
                errorDiv.classList.add('show');
                return;
            }

            // 4. Check password length
            if (password.length < 6) {
                errorDiv.textContent = '❌ Password must be at least 6 characters long.';
                errorDiv.classList.add('show');
                return;
            }

            // 5. Check if passwords match
            if (password !== confirmPassword) {
                errorDiv.textContent = '❌ Passwords do not match!';
                errorDiv.classList.add('show');
                return;
            }

            // ===== SAVE STUDENT DATA =====

            // Create student object
            const studentData = {
                id: 'STU-' + Date.now(),
                fullName: fullName,
                email: email,
                password: password,
                signupDate: new Date().toLocaleString()
            };

            // Get existing students from localStorage
            let existingStudents = JSON.parse(localStorage.getItem('students') || '[]');
            
            // Add new student
            existingStudents.push(studentData);
            
            // Save to localStorage
            localStorage.setItem('students', JSON.stringify(existingStudents));
            
            // Auto-login: Save current student
            localStorage.setItem('currentStudent', JSON.stringify(studentData));

            // ===== SHOW SUCCESS =====
            successDiv.textContent = '✅ Account created successfully! Redirecting to dashboard...';
            successDiv.classList.add('show');

            // ===== REDIRECT AFTER 1.5 SECONDS =====
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
