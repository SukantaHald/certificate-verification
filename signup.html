<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - InternVerify</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== LOGIN/SIGNUP PAGE STYLES ===== */
        .auth-container {
            max-width: 450px;
            margin: 80px auto 40px;
            padding: 20px;
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.08);
        }

        .auth-box .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-box .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-box .logo p {
            color: #888;
            font-size: 0.95rem;
            margin-top: 5px;
        }

        .auth-box .form-group {
            margin-bottom: 20px;
        }

        .auth-box .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 0.95rem;
        }

        .auth-box .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .auth-box .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .auth-box .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .auth-box .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .auth-box .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .auth-box .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-box .auth-link a:hover {
            text-decoration: underline;
        }

        .auth-error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .auth-error.show {
            display: block;
        }

        .auth-success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .auth-success.show {
            display: block;
        }

        .password-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <h1>✨ InternVerify</h1>
                <p>Create your student account</p>
            </div>

            <div id="authError" class="auth-error">❌ Error message</div>
            <div id="authSuccess" class="auth-success">✅ Success message</div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Gmail Address</label>
                    <input type="email" id="email" placeholder="yourname@gmail.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required minlength="6">
                    <div class="password-hint">Minimum 6 characters</div>
                </div>

                <div class="form-group">
                    <label>Re-enter Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                </div>

                <button type="submit" class="btn-primary">🚀 Create Account</button>

                <div class="auth-link">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // =============================================
        // ===== SIGNUP FUNCTION =====
        // =============================================

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('authError');
            const successDiv = document.getElementById('authSuccess');

            // Hide previous messages
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            // Validate email (must be Gmail)
            if (!email.endsWith('@gmail.com')) {
                errorDiv.textContent = '❌ Please use a valid Gmail address (e.g., name@gmail.com)';
                errorDiv.classList.add('show');
                return;
            }

            // Validate password match
            if (password !== confirmPassword) {
                errorDiv.textContent = '❌ Passwords do not match!';
                errorDiv.classList.add('show');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                errorDiv.textContent = '❌ Password must be at least 6 characters long.';
                errorDiv.classList.add('show');
                return;
            }

            // Check if email already registered
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            if (students.find(s => s.email === email)) {
                errorDiv.textContent = '❌ This email is already registered. Please login.';
                errorDiv.classList.add('show');
                return;
            }

            // Save student data
            const studentData = {
                id: 'STU-' + Date.now(),
                fullName: fullName,
                email: email,
                password: password,
                signupDate: new Date().toLocaleString()
            };

            students.push(studentData);
            localStorage.setItem('students', JSON.stringify(students));

            // Auto-login
            localStorage.setItem('currentStudent', JSON.stringify(studentData));

            // Show success
            successDiv.textContent = '✅ Account created successfully! Redirecting to dashboard...';
            successDiv.classList.add('show');

            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
